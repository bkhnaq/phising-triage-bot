name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check api bot config email_analysis report scoring threat_intel main.py

      - name: Type check (mypy)
        run: mypy api bot config email_analysis report scoring threat_intel --ignore-missing-imports --disable-error-code=import-untyped

      - name: Tests (pytest)
        run: pytest -q tests

      - name: Security scan (bandit)
        run: bandit -r api bot config email_analysis report scoring threat_intel -lll

      - name: Dependency scan (pip-audit)
        run: pip-audit
