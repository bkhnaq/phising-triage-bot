repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: mypy-fast
        name: mypy (fast)
        entry: mypy
        language: python
        additional_dependencies:
          - mypy>=1.11,<2
        pass_filenames: true
        types: [python]
        args:
          - --ignore-missing-imports
          - --disable-error-code=import-untyped
